<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/link/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e8f5e9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: none; text-align: center; padding: 40px; }
        .icon-box { background: #28a745; color: white; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; }
        .btn-home { background: #28a745; color: white; border-radius: 30px; padding: 10px 30px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card col-md-4">
        <div class="icon-box">✔</div>
        <h1 class="text-success">Loan Approved!</h1>
        <p class="text-muted lead">Your financial profile meets all our criteria. Your application has been successfully processed.</p>
        <hr>
        <a href="/" class="btn-home">Back to Portal</a>
    </div>
</body>
</html>
