<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-card { max-width: 850px; margin: 40px auto; border-radius: 15px; border: none; }
        .section-title { border-left: 4px solid #0d6efd; padding-left: 15px; margin-bottom: 20px; font-weight: 600; color: #333; }
        .btn-predict { background-color: #0d6efd; border: none; padding: 12px; font-weight: 600; transition: 0.3s; }
        .btn-predict:hover { background-color: #0b5ed7; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow-lg form-card p-5">
        <h2 class="text-center mb-5">Loan Eligibility Predictor</h2>
        
        <form action="/predict" method="post">
            <div class="section-title">Personal & Employment Details</div>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">No. of Dependents</label>
                    <input type="number" name="no_of_dependents" class="form-control" min="0" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Education Status</label>
                    <select name="education" class="form-select" required>
                        <option value="0">Graduate</option>
                        <option value="1">Not Graduate</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Self Employed?</label>
                    <select name="self_employed" class="form-select" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
            </div>

            <div class="section-title">Financials & Asset Profile</div>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">CIBIL Score</label>
                    <input type="number" name="cibil_score" class="form-control" min="300" max="900" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Annual Income (₹)</label>
                    <input type="number" name="income_annum" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Loan Amount (₹)</label>
                    <input type="number" name="loan_amount" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Loan Term (Years)</label>
                    <input type="number" name="loan_term" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Residential Assets</label>
                    <input type="number" name="residential_assets_value" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Commercial Assets</label>
                    <input type="number" name="commercial_assets_value" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Luxury Assets</label>
                    <input type="number" name="luxury_assets_value" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Bank Asset Value</label>
                    <input type="number" name="bank_asset_value" class="form-control" required>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-predict w-100 shadow">Predict Loan Status</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
